# SketchFlat — Nginx 리버스 프록시
# 브라우저 → Nginx(:80) → Next.js(web:3000). 정적 캐싱 + gzip + /api 프록시.

upstream web_upstream {
    server web:3000;
}

# gzip 압축 — 텍스트 자산 전송량 감소.
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml
    font/woff2;

server {
    listen 80;
    server_name _;

    # 업로드 이미지 등 — 바디 크기 여유.
    client_max_body_size 25m;

    # Next.js 정적 자산 — 길게 캐싱 (해시 파일명이라 안전).
    location /_next/static/ {
        proxy_pass http://web_upstream;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API 라우트 — 프록시 패스. 캐싱하지 않음.
    location /api/ {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Quiver 동기 벡터화가 수십 초 걸릴 수 있어 타임아웃 여유.
        proxy_read_timeout 120s;
    }

    # 그 외 모든 요청 — Next.js 앱으로 프록시.
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
